version: "2026-04-22"
defaults:
  auto_mitigate: true
  escalation_required: false
  require_human_approval: false
  max_consecutive_actions: 2
  allowed_actions:
    - observe_only
    - restart_component
    - rollback_latest_deployment
    - escalate_incident
    - page_on_call
  denied_actions: []
  escalation_policy: "none"
global:
  max_consecutive_actions: 2
severity_rules:
  sev1:
    auto_mitigate: false
    escalation_required: true
    require_human_approval: false
    escalation_policy: "page_immediately"
  sev2:
    auto_mitigate: true
    escalation_required: true
    require_human_approval: true
    escalation_policy: "escalate_if_unverified"
  sev3:
    auto_mitigate: true
    escalation_required: false
    require_human_approval: false
    escalation_policy: "monitor_then_escalate"
scoped_rules:
  - match:
      service: "payments-api"
      tier: "backend"
      environment: "prod"
    settings:
      max_consecutive_actions: 2
metric_rules:
  - metric_name: "cpu_utilization"
    settings:
      escalation_required: true
action_rules:
  observe_only:
    action: "observe_only"
    enabled: true
    require_human_approval: false
  restart_component:
    action: "restart_component"
    enabled: true
    require_human_approval: false
  rollback_latest_deployment:
    action: "rollback_latest_deployment"
    enabled: true
    require_human_approval: true
  escalate_incident:
    action: "escalate_incident"
    enabled: true
    require_human_approval: false
  page_on_call:
    action: "page_on_call"
    enabled: true
    require_human_approval: false

# Escalation channel gate — controls whether each channel fires live notifications.
# Set the env vars (SLACK_WEBHOOK_URL, PAGERDUTY_ROUTING_KEY) then flip live: true
# here for the environments where you want real pages/messages.
escalation_channels:
  slack:
    live:
      local: false
      staging: false    # flip to true once SLACK_WEBHOOK_URL is set
      prod: false       # flip to true for production alerting
  pagerduty:
    live:
      local: false
      staging: false    # flip to true once PAGERDUTY_ROUTING_KEY is set
      prod: false       # flip to true for production on-call paging
  teams:
    live:
      local: false
      staging: false    # flip to true once TEAMS_WEBHOOK_URL is set
      prod: false       # flip to true for production Microsoft Teams alerts

# Live execution gate — controls when Reflex moves from simulation to real execution.
# Safe default: everything off. Flip `enabled: true` and set per-environment/per-action
# flags when the environment is ready for autonomous action.
live_execution:
  enabled: false            # global kill switch — must be true for any live action to run
  environments:
    local: false
    staging: true           # staging can run live once enabled globally
    prod: false             # prod requires explicit per-action opt-in below
  per_action:
    observe_only: false     # noop — never needs live mode
    restart_component: true
    rollback_latest_deployment: false   # high-risk: always dry unless explicitly enabled
    escalate_incident: true
    page_on_call: true
