scheduler:
  enabled: true
sources:
  jira:
    enabled: true
    interval_seconds: 60
    range_hours: 24
    batch_size: 200
    jitter_seconds: 5
  devops_portal:
    # Disabled by default. Set CORTEX_ALERT_SOURCE_HOST and configure
    # config/devops_portal_targets.json to enable alert source pulling.
    enabled: false
    interval_seconds: 300
    range_hours: 24
    batch_size: 200
    jitter_seconds: 5
  cluster_hygiene:
    # Disabled by default. Configure config/cluster_targets.json to enable.
    enabled: false
    interval_seconds: 300
    range_hours: 24
    batch_size: 200
    jitter_seconds: 5
  prometheus:
    # Disabled by default. Set PROMETHEUS_ALERTMANAGER_URL (and optionally
    # PROMETHEUS_URL) in .env, then set enabled: true to activate.
    enabled: false
    interval_seconds: 30
    range_hours: 1
    batch_size: 500
    jitter_seconds: 3
  cloudwatch:
    # AWS CloudWatch Alarms + Health events.
    # Uses EC2 instance profile automatically — no keys needed on AWS compute.
    # CLOUDWATCH_NAMESPACES=AWS/EC2,AWS/RDS,AWS/EKS  (optional filter)
    enabled: false
    interval_seconds: 60
    range_hours: 1
    batch_size: 200
    jitter_seconds: 5
  datadog:
    # Datadog Monitors + Events API.
    # Requires DATADOG_API_KEY + DATADOG_APP_KEY in .env.
    enabled: false
    interval_seconds: 60
    range_hours: 1
    batch_size: 200
    jitter_seconds: 5
  tracing:
    # Tracing + mesh + eBPF connector scheduler.
    # Runs all configured sources every interval_seconds.
    # With no env vars set, runs eBPF demo mode to feed the service map.
    # Set enabled: true once any of the env vars below are configured:
    #   PIXIE_API_KEY + PIXIE_CLUSTER_ID   — eBPF via Pixie
    #   MESH_PROMETHEUS_URL                — Istio / Linkerd / Cilium
    #   JAEGER_URL / ZIPKIN_URL / TEMPO_URL — distributed tracing
    enabled: false
    interval_seconds: 30
