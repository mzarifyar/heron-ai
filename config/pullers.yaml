scheduler:
  enabled: true
sources:
  jira:
    enabled: true
    interval_seconds: 60
    range_hours: 24
    batch_size: 200
    jitter_seconds: 5
  devops_portal:
    # Disabled by default. Set CORTEX_ALERT_SOURCE_HOST and configure
    # config/devops_portal_targets.json to enable alert source pulling.
    enabled: false
    interval_seconds: 300
    range_hours: 24
    batch_size: 200
    jitter_seconds: 5
  cluster_hygiene:
    # Disabled by default. Configure config/cluster_targets.json to enable.
    enabled: false
    interval_seconds: 300
    range_hours: 24
    batch_size: 200
    jitter_seconds: 5
  prometheus:
    # Disabled by default. Set PROMETHEUS_ALERTMANAGER_URL (and optionally
    # PROMETHEUS_URL) in .env, then set enabled: true to activate.
    enabled: false
    interval_seconds: 30
    range_hours: 1
    batch_size: 500
    jitter_seconds: 3
