services:
  heron:
    image: heron:local
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: heron
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./docs/runbooks:/app/docs/runbooks:ro
      - ../bots-terraform:/workspace/bots-terraform:ro
      - ${HOME}/.kube:/root/.kube:ro
      - ${HOME}/.aws:/root/.aws:ro
    ports:
      - "${HERON_API_PORT:-8080}:8080"
    environment:
      HERON_API_HOST: 0.0.0.0
      PYTHONUNBUFFERED: "1"
      HERON_BOTS_TERRAFORM_ROOT: /workspace/bots-terraform
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
